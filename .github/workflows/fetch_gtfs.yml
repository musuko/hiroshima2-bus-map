# =============================================================================
# fetch_gtfs.yml
# 広島県内バス事業者のGTFS静的データおよびリアルタイムデータを取得する
# GitHub Actions ワークフロー
#
# 静的データ  : 毎日 02:00 UTC に1回取得（時刻表・バス停情報など）
# リアルタイム: 2分ごとに取得（バス位置・遅延・アラート情報）
#
# 取得後のフォルダ構成:
#   data/
#     hiroden/              # 広島電鉄株式会社 (ID: 8)
#       static/             # GTFS-JP 静的ファイル群 (stops.txt, calendar.txt 等)
#       realtime/           # vehicle_position.bin, trip_updates.bin, alerts.bin
#     hiroshimabus/         # 広島バス株式会社 (ID: 9)
#     hirokotsu/            # 広島交通株式会社 (ID: 10)
#     geiyo/                # 芸陽バス株式会社 (ID: 11)
#     bihoku/               # 備北交通株式会社 (ID: 12)
#     hdnishihiroshima/     # エイチ・ディー西広島株式会社 (ID: 13)
#     fouble/               # 株式会社フォーブル (ID: 14)
#     jrbus/                # JRバス中国株式会社 (ID: 15)
#     sasaki/               # 株式会社ささき観光 おおのハートバス (ID: 17)
#     kurebus/              # 呉市生活バス (ID: 18)
#     hatsukaichi/          # 廿日市市自主運行バス (ID: 19)
#     onomichi/             # おのみちバス株式会社 (ID: 53)
#     asahi/                # 朝日交通株式会社 阿戸熊野線 (ID: 54)
# =============================================================================

name: Fetch GTFS Data (Static + Realtime)

on:
  # ---------------------------------------------------------------------------
  # 定期実行トリガー
  # cron 書式: 分 時 日 月 曜日 (UTC)
  #   */5 * * * *  → 5分ごと（リアルタイムデータ用）
  #   0 2  * * *   → 毎日 02:00 UTC（静的データ用、日本時間 11:00）
  # GitHub Actions のスケジューラは高負荷時に数分遅延することがある。
  # ---------------------------------------------------------------------------
  schedule:
    - cron: '*/5 * * * *'   # リアルタイムデータ用: 5分ごと
    - cron: '0 2 * * *'     # 静的データ用: 毎日 02:00 UTC

  # ---------------------------------------------------------------------------
  # 手動実行トリガー
  # Actions タブの "Run workflow" ボタンから手動で起動できる。
  # fetch_static を "yes" にすると静的データも取得する。
  # ---------------------------------------------------------------------------
  workflow_dispatch:
    inputs:
      fetch_static:
        description: '静的GTFSデータも取得しますか？ (yes/no)'
        required: false
        default: 'no'

jobs:
  # ===========================================================================
  # ジョブ1: リアルタイムデータ取得（2分ごとに実行）
  #
  # 取得対象ファイル（事業者ごと）:
  #   vehicle_position.bin ... 各バスの現在位置（緯度・経度・速度・方向）
  #   trip_updates.bin     ... 遅延・定刻・運休などのスケジュール更新情報
  #   alerts.bin           ... 運行障害・迂回・臨時停車などのアラート情報
  # ===========================================================================
  fetch-realtime:
    name: リアルタイムデータ取得
    runs-on: ubuntu-latest
    permissions:
      contents: write   # リポジトリへのファイルpushに必要

    steps:
      # -----------------------------------------------------------------------
      # ステップ1: リポジトリをチェックアウト
      # ファイルの書き込みとpushを行うために必要。
      # -----------------------------------------------------------------------
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # ステップ2: 全事業者のリアルタイムデータを取得
      #
      # 事業者リストの書式: "フォルダ名  事業者ID"
      # リアルタイムAPIのURLパターン:
      #   https://ajt-mobusta-gtfs.mcapps.jp/realtime/<ID>/<ファイル種別>.bin
      #
      # curlオプション:
      #   -s            ... 進捗表示を非表示（ログを見やすくする）
      #   -w "%{http_code}" ... HTTPステータスコードを標準出力に返す
      #   --max-time 30 ... 30秒でタイムアウト（ハングアップ防止）
      #   -A "..."      ... User-Agentを設定（サーバー側のブロック回避）
      #   -o <dest>     ... 出力先ファイルパス
      # -----------------------------------------------------------------------
      - name: 全事業者のリアルタイムバイナリを取得
        run: |
          # Mobusta リアルタイムAPIのベースURL
          BASE_URL="https://ajt-mobusta-gtfs.mcapps.jp/realtime"

          # 事業者リスト: "フォルダ名  事業者ID"
          # 事業者を追加・削除する場合はこのリストを編集する。
          OPERATORS=(
            "hiroden            8"   # 広島電鉄株式会社
            "hiroshimabus       9"   # 広島バス株式会社
            "hirokotsu         10"   # 広島交通株式会社
            "geiyo             11"   # 芸陽バス株式会社
            "bihoku            12"   # 備北交通株式会社
            "hdnishihiroshima  13"   # エイチ・ディー西広島株式会社
            "fouble            14"   # 株式会社フォーブル
            "jrbus             15"   # JRバス中国株式会社
            "sasaki            17"   # 株式会社ささき観光（おおのハートバス）
            "kurebus           18"   # 呉市生活バス
            "hatsukaichi       19"   # 廿日市市自主運行バス
            "onomichi          53"   # おのみちバス株式会社
            "asahi             54"   # 朝日交通株式会社 阿戸熊野線
          )

          # 事業者ごとに取得するリアルタイムファイルの種別
          REALTIME_FILES=(
            "vehicle_position"   # 各バスのGPS位置情報
            "trip_updates"       # 遅延・スケジュール更新情報
            "alerts"             # 運行アラート・障害情報
          )

          # 結果集計用カウンタ
          TOTAL=0
          SUCCESS=0
          FAIL=0

          for ENTRY in "${OPERATORS[@]}"; do
            # エントリからフォルダ名と事業者IDを取り出す
            FOLDER=$(echo "$ENTRY" | awk '{print $1}')
            OP_ID=$(echo  "$ENTRY" | awk '{print $2}')

            # リアルタイムデータ保存ディレクトリを作成（既存でも無視）
            mkdir -p "data/${FOLDER}/realtime"

            for FILE_TYPE in "${REALTIME_FILES[@]}"; do
              TOTAL=$((TOTAL + 1))
              URL="${BASE_URL}/${OP_ID}/${FILE_TYPE}.bin"
              DEST="data/${FOLDER}/realtime/${FILE_TYPE}.bin"

              # ファイルを取得し、HTTPステータスコードを変数に保存
              HTTP_STATUS=$(curl -s -w "%{http_code}" \
                --max-time 30 \
                -A "Mozilla/5.0 GitHubActions-GTFSFetcher/1.0" \
                -o "${DEST}" \
                "${URL}")

              if [ "$HTTP_STATUS" = "200" ]; then
                # 取得成功: ファイルサイズをバイト単位で表示
                SIZE=$(wc -c < "${DEST}")
                echo "[成功] ${FOLDER}/${FILE_TYPE}.bin  (${SIZE} バイト, HTTP ${HTTP_STATUS})"
                SUCCESS=$((SUCCESS + 1))
              else
                # 取得失敗: 不完全なファイルをコミットしないよう削除
                echo "[失敗] ${FOLDER}/${FILE_TYPE}.bin  (HTTP ${HTTP_STATUS})"
                rm -f "${DEST}"
                FAIL=$((FAIL + 1))
              fi
            done
          done

          # 取得結果のサマリーを表示
          echo "--------------------------------------------"
          echo "リアルタイム取得結果: ${SUCCESS}/${TOTAL} 成功, ${FAIL} 失敗"
          echo "--------------------------------------------"

      # -----------------------------------------------------------------------
      # ステップ3: 更新されたリアルタイムファイルをコミット・プッシュ
      #
      # コミットメッセージに [skip ci] を付けることで、このpushによって
      # 再度ワークフローが起動する無限ループを防ぐ。
      # 変更がない場合（全ファイルが前回と同一）はコミットをスキップする。
      # -----------------------------------------------------------------------
      - name: リアルタイムデータをコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 新規・更新されたリアルタイムバイナリをステージング
          git add data/*/realtime/*.bin

          # 差分がある場合のみコミット（空コミット防止）
          if git diff --cached --quiet; then
            echo "リアルタイムデータに変更なし。コミットをスキップします。"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: update realtime data ${TIMESTAMP} [skip ci]"
            git push
            echo "リアルタイムデータをコミット・プッシュしました。"
          fi

  # ===========================================================================
  # ジョブ2: 静的データ取得（毎日 02:00 UTC に1回、または手動で実行）
  #
  # 取得対象ファイル（ZIPを展開して保存）:
  #   stops.txt          ... バス停の位置（緯度・経度）と名称
  #   routes.txt         ... 路線の定義（路線名・色など）
  #   trips.txt          ... 便の定義（路線と運行パターンの紐付け）
  #   stop_times.txt     ... 時刻表（各便の各バス停の発着時刻）
  #   calendar.txt       ... 運行日区分（平日・土曜・日曜・祝日など）
  #   calendar_dates.txt ... 運行日の例外（祝日・特別ダイヤ適用日など）
  #   shapes.txt         ... 路線の走行経路ジオメトリ（利用可能な場合）
  #   agency.txt         ... バス事業者の基本情報
  # ===========================================================================
  fetch-static:
    name: 静的データ取得
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # -------------------------------------------------------------------------
    # 実行条件:
    #   (a) 毎日 02:00 UTC の定期スケジュールで起動した場合、または
    #   (b) 手動実行で fetch_static = 'yes' が指定された場合
    # 2分ごとのリアルタイム用スケジュールでは、このジョブはスキップされる。
    # -------------------------------------------------------------------------
    if: |
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 2')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.fetch_static == 'yes')

    steps:
      # -----------------------------------------------------------------------
      # ステップ1: リポジトリをチェックアウト
      # -----------------------------------------------------------------------
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # ステップ2: unzip コマンドの存在を確認・インストール
      # ubuntu-latest には通常インストール済みだが、明示的に指定して安全を期す。
      # -----------------------------------------------------------------------
      - name: unzip コマンドを確認・インストール
        run: sudo apt-get install -y unzip

      # -----------------------------------------------------------------------
      # ステップ3: 全事業者の静的GTFSデータを取得・展開
      #
      # 静的データAPIのURLパターン:
      #   https://ajt-mobusta-gtfs.mcapps.jp/static/<ID>/current_data.zip
      #
      # ZIPを取得後、data/<事業者名>/static/ に展開し、
      # ZIPファイル本体はリポジトリを肥大化させないよう削除する。
      # -----------------------------------------------------------------------
      - name: 全事業者の静的GTFS-JPデータを取得・展開
        run: |
          # Mobusta 静的データAPIのベースURL
          BASE_URL="https://ajt-mobusta-gtfs.mcapps.jp/static"

          # 事業者リスト: "フォルダ名  事業者ID"
          OPERATORS=(
            "hiroden            8"   # 広島電鉄株式会社
            "hiroshimabus       9"   # 広島バス株式会社
            "hirokotsu         10"   # 広島交通株式会社
            "geiyo             11"   # 芸陽バス株式会社
            "bihoku            12"   # 備北交通株式会社
            "hdnishihiroshima  13"   # エイチ・ディー西広島株式会社
            "fouble            14"   # 株式会社フォーブル
            "jrbus             15"   # JRバス中国株式会社
            "sasaki            17"   # 株式会社ささき観光（おおのハートバス）
            "kurebus           18"   # 呉市生活バス
            "hatsukaichi       19"   # 廿日市市自主運行バス
            "onomichi          53"   # おのみちバス株式会社
            "asahi             54"   # 朝日交通株式会社 阿戸熊野線
          )

          # 結果集計用カウンタ
          TOTAL=0
          SUCCESS=0
          FAIL=0

          for ENTRY in "${OPERATORS[@]}"; do
            # エントリからフォルダ名と事業者IDを取り出す
            FOLDER=$(echo "$ENTRY" | awk '{print $1}')
            OP_ID=$(echo  "$ENTRY" | awk '{print $2}')
            TOTAL=$((TOTAL + 1))

            # 静的データ保存ディレクトリを作成
            mkdir -p "data/${FOLDER}/static"

            URL="${BASE_URL}/${OP_ID}/current_data.zip"
            ZIP_DEST="data/${FOLDER}/static/current_data.zip"

            echo "${FOLDER} (ID: ${OP_ID}) の静的データを取得中..."

            # ZIPファイルを取得
            HTTP_STATUS=$(curl -s -w "%{http_code}" \
              --max-time 60 \
              -A "Mozilla/5.0 GitHubActions-GTFSFetcher/1.0" \
              -o "${ZIP_DEST}" \
              "${URL}")

            if [ "$HTTP_STATUS" = "200" ]; then
              # ZIP を static フォルダに展開（既存ファイルは上書き）
              unzip -o "${ZIP_DEST}" -d "data/${FOLDER}/static/"

              # リポジトリ肥大化防止のため ZIP を削除（.txt だけ残す）
              rm -f "${ZIP_DEST}"

              # 展開されたファイル一覧を表示
              echo "[成功] ${FOLDER} 静的データ展開完了:"
              ls "data/${FOLDER}/static/"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "[失敗] ${FOLDER} 静的データ取得失敗 (HTTP ${HTTP_STATUS})"
              rm -f "${ZIP_DEST}"
              FAIL=$((FAIL + 1))
            fi
          done

          # 取得結果のサマリーを表示
          echo "--------------------------------------------"
          echo "静的データ取得結果: ${SUCCESS}/${TOTAL} 成功, ${FAIL} 失敗"
          echo "--------------------------------------------"

      # -----------------------------------------------------------------------
      # ステップ4: 展開した静的ファイルをコミット・プッシュ
      #
      # stop_times.txt は行数が多く差分が大きくなりがちだが、
      # 改正日以外は変化しないため問題ない。
      # -----------------------------------------------------------------------
      - name: 静的データをコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 展開された静的テキストファイルをすべてステージング
          git add data/*/static/*.txt

          # 差分がある場合のみコミット
          if git diff --cached --quiet; then
            echo "静的データに変更なし。コミットをスキップします。"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d')
            git commit -m "chore: update static GTFS-JP data ${TIMESTAMP} [skip ci]"
            git push
            echo "静的データをコミット・プッシュしました。"
          fi
