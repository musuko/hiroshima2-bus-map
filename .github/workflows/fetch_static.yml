# =============================================================================
# fetch_static.yml
# 静的GTFSデータを毎日確認して更新するワークフロー
#
# 実行タイミング:
#   毎日 02:00 UTC（日本時間 11:00）に自動実行
#   手動実行も可能
#
# 更新判定の仕組み:
#   各事業者の feed_info.txt の feed_start_date を比較する
#   リポジトリ内のデータと異なる場合のみ更新する
#   これによりダイヤ改正があった事業者だけ自動更新される
# =============================================================================

name: Fetch Static Data

on:
  # 毎日 02:00 UTC（日本時間 11:00）に自動実行する
  schedule:
    - cron: '0 2 * * *'

  # 手動実行も可能（全事業者を強制更新したい場合に使う）
  workflow_dispatch:
    inputs:
      force_update:
        description: '全事業者を強制更新しますか？ (yes/no)'
        required: false
        default: 'no'

jobs:
  fetch-static:
    name: 静的データ確認・更新
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # -----------------------------------------------------------------------
      # ステップ1: リポジトリをチェックアウト
      # -----------------------------------------------------------------------
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4.2.2

      # -----------------------------------------------------------------------
      # ステップ2: unzip をインストール
      # -----------------------------------------------------------------------
      - name: unzip をインストール
        run: sudo apt-get install -y unzip

      # -----------------------------------------------------------------------
      # ステップ3: 各事業者のデータを確認して必要な場合のみ更新する
      #
      # 更新判定:
      #   1. Mobistaサーバーから current_data.zip を取得する
      #   2. ZIPの中の feed_info.txt から feed_start_date を取得する
      #   3. リポジトリ内の feed_info.txt の feed_start_date と比較する
      #   4. 異なる場合（または強制更新の場合）のみ展開して保存する
      # -----------------------------------------------------------------------
      - name: 各事業者の静的データを確認・更新
        run: |
          # Mobusta 静的データAPIのベースURL
          BASE_URL="https://ajt-mobusta-gtfs.mcapps.jp/static"

          # 手動実行時の強制更新フラグ
          FORCE_UPDATE="${{ github.event.inputs.force_update }}"

          # 事業者リスト: "フォルダ名  事業者ID"
          OPERATORS=(
            "hiroden            8"   # 広島電鉄株式会社
            "hiroshimabus       9"   # 広島バス株式会社
            "hirokotsu         10"   # 広島交通株式会社
            "geiyo             11"   # 芸陽バス株式会社
            "bihoku            12"   # 備北交通株式会社
            "hdnishihiroshima  13"   # エイチ・ディー西広島株式会社
            "fouble            14"   # 株式会社フォーブル
            "jrbus             15"   # JRバス中国株式会社
            "sasaki            17"   # 株式会社ささき観光（おおのハートバス）
            "kurebus           18"   # 呉市生活バス
            "hatsukaichi       19"   # 廿日市市自主運行バス
            "onomichi          53"   # おのみちバス株式会社
            "asahi             54"   # 朝日交通株式会社 阿戸熊野線
          )

          # 結果集計用カウンタ
          UPDATED=0
          SKIPPED=0
          FAIL=0

          for ENTRY in "${OPERATORS[@]}"; do
            FOLDER=$(echo "$ENTRY" | awk '{print $1}')
            OP_ID=$(echo  "$ENTRY" | awk '{print $2}')

            echo "========================================"
            echo "確認中: ${FOLDER} (ID: ${OP_ID})"

            # 作業用一時ディレクトリを作成する
            WORK_DIR="/tmp/${FOLDER}"
            mkdir -p "${WORK_DIR}"
            mkdir -p "data/${FOLDER}/static"

            URL="${BASE_URL}/${OP_ID}/current_data.zip"
            ZIP_DEST="${WORK_DIR}/current_data.zip"

            # ZIPファイルを取得する
            HTTP_STATUS=$(curl -s -w "%{http_code}" \
              --max-time 60 \
              -A "Mozilla/5.0 GitHubActions-GTFSFetcher/1.0" \
              -o "${ZIP_DEST}" \
              "${URL}")

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "[失敗] ${FOLDER} ZIPの取得に失敗 (HTTP ${HTTP_STATUS})"
              FAIL=$((FAIL + 1))
              continue
            fi

            # ZIPから feed_info.txt だけを取り出して
            # 新しいデータの feed_start_date を取得する
            NEW_START_DATE=$(unzip -p "${ZIP_DEST}" feed_info.txt \
              | tail -n +2 \
              | cut -d',' -f4 \
              | tr -d '\r' \
              | head -1)

            if [ -z "$NEW_START_DATE" ]; then
              echo "[警告] ${FOLDER} feed_info.txt から開始日を取得できなかった"
              echo "       強制的に更新する"
              NEW_START_DATE="unknown"
            fi

            echo "新しいデータの開始日: ${NEW_START_DATE}"

            # リポジトリ内の現在の feed_start_date を取得する
            CURRENT_FEED_INFO="data/${FOLDER}/static/feed_info.txt"
            if [ -f "${CURRENT_FEED_INFO}" ]; then
              CURRENT_START_DATE=$(tail -n +2 "${CURRENT_FEED_INFO}" \
                | cut -d',' -f4 \
                | tr -d '\r' \
                | head -1)
              echo "現在のデータの開始日: ${CURRENT_START_DATE}"
            else
              # feed_info.txt が存在しない場合は初回取得とみなす
              CURRENT_START_DATE="none"
              echo "現在のデータ: なし（初回取得）"
            fi

            # 開始日が同じかつ強制更新でない場合はスキップする
            if [ "$NEW_START_DATE" = "$CURRENT_START_DATE" ] \
              && [ "$FORCE_UPDATE" != "yes" ]; then
              echo "[スキップ] ${FOLDER} データに変更なし"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            # 開始日が異なる（または強制更新）の場合は展開して保存する
            echo "[更新] ${FOLDER} 開始日が変わった: ${CURRENT_START_DATE} → ${NEW_START_DATE}"

            # 既存の静的データを削除してから展開する
            rm -f "data/${FOLDER}/static/"*.txt

            unzip -o "${ZIP_DEST}" -d "data/${FOLDER}/static/"
            echo "展開完了:"
            ls "data/${FOLDER}/static/"

            UPDATED=$((UPDATED + 1))
          done

          # 結果サマリーを表示する
          echo "========================================"
          echo "確認結果: ${UPDATED} 件更新, ${SKIPPED} 件スキップ, ${FAIL} 件失敗"
          echo "========================================"

          # 更新件数をファイルに保存する（次のステップで使用する）
          echo "${UPDATED}" > /tmp/updated_count.txt

      # -----------------------------------------------------------------------
      # ステップ4: 更新があった場合のみコミット・プッシュする
      # -----------------------------------------------------------------------
      - name: 更新データをコミット・プッシュ
        run: |
          # 更新件数を読み込む
          UPDATED=$(cat /tmp/updated_count.txt)

          if [ "$UPDATED" = "0" ]; then
            echo "更新なし。コミットをスキップします。"
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 更新された静的ファイルをステージングする
          git add data/*/static/*.txt

          if git diff --cached --quiet; then
            echo "差分なし。コミットをスキップします。"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d')
            git commit -m "chore: update static GTFS-JP data ${TIMESTAMP} [skip ci]"
            git push
            echo "静的データをコミット・プッシュしました。（${UPDATED} 件更新）"
          fi