# =============================================================================
# fetch_static.yml
# 静的GTFSデータを毎日確認して更新するワークフロー
#
# 実行タイミング:
#   毎日 02:00 UTC（日本時間 11:00）に自動実行
#   手動実行も可能
#
# 更新判定の仕組み:
#   各事業者の feed_info.txt の feed_start_date を比較する
#   リポジトリ内のデータと異なる場合のみ更新する
#   これによりダイヤ改正があった事業者だけ自動更新される
# =============================================================================

name: Fetch Static Data

on:
  # 毎日 02:00 UTC（日本時間 11:00）に自動実行する
  schedule:
    - cron: '0 2 * * *'

  # 手動実行も可能（全事業者を強制更新したい場合に使う）
  workflow_dispatch:
    inputs:
      force_update:
        description: '全事業者を強制更新しますか？ (yes/no)'
        required: false
        default: 'no'

jobs:
  fetch-static:
    name: 静的データ確認・更新
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # -----------------------------------------------------------------------
      # ステップ1: リポジトリをチェックアウト
      # -----------------------------------------------------------------------
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4.2.2

      # -----------------------------------------------------------------------
      # ステップ2: unzip をインストール
      # -----------------------------------------------------------------------
      - name: unzip をインストール
        run: sudo apt-get install -y unzip

      # -----------------------------------------------------------------------
      # ステップ3: 各事業者のデータを確認して必要な場合のみ更新する
      #
      # 更新判定:
      #   1. Mobistaサーバーから current_data.zip を取得する
      #   2. ZIPの中の feed_info.txt から feed_start_date を取得する
      #   3. リポジトリ内の feed_info.txt の feed_start_date と比較する
      #   4. 異なる場合（または強制更新の場合）のみ展開して保存する
      # -----------------------------------------------------------------------
      - name: 全事業者の静的GTFS-JPデータを取得・展開
        run: |
          # -------------------------------------------------------
          # Mobusta システム事業者（既存13社）
          # URLパターン: https://ajt-mobusta-gtfs.mcapps.jp/static/<ID>/current_data.zip
          # -------------------------------------------------------
          BASE_URL="https://ajt-mobusta-gtfs.mcapps.jp/static"

          OPERATORS=(
            "hiroden            8"
            "hiroshimabus       9"
            "hirokotsu         10"
            "geiyo             11"
            "bihoku            12"
            "hdnishihiroshima  13"
            "fouble            14"
            "jrbus             15"
            "sasaki            17"
            "kurebus           18"
            "hatsukaichi       19"
            "onomichi          53"
            "asahi             54"
          )

          FORCE_UPDATE="${{ github.event.inputs.force_update }}"
          UPDATED=0
          SKIPPED=0
          FAIL=0

          for ENTRY in "${OPERATORS[@]}"; do
            FOLDER=$(echo "$ENTRY" | awk '{print $1}')
            OP_ID=$(echo  "$ENTRY" | awk '{print $2}')

            echo "========================================"
            echo "確認中: ${FOLDER} (ID: ${OP_ID})"

            WORK_DIR="/tmp/${FOLDER}"
            mkdir -p "${WORK_DIR}"
            mkdir -p "data/${FOLDER}/static"

            URL="${BASE_URL}/${OP_ID}/current_data.zip"
            ZIP_DEST="${WORK_DIR}/current_data.zip"

            HTTP_STATUS=$(curl -s -w "%{http_code}" \
              --max-time 60 \
              -A "Mozilla/5.0 GitHubActions-GTFSFetcher/1.0" \
              -o "${ZIP_DEST}" \
              "${URL}")

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "[失敗] ${FOLDER} ZIPの取得に失敗 (HTTP ${HTTP_STATUS})"
              FAIL=$((FAIL + 1))
              continue
            fi

            NEW_START_DATE=$(unzip -p "${ZIP_DEST}" feed_info.txt \
              | tail -n +2 \
              | cut -d',' -f4 \
              | tr -d '\r' \
              | head -1)

            if [ -z "$NEW_START_DATE" ]; then
              NEW_START_DATE="unknown"
            fi

            echo "新しいデータの開始日: ${NEW_START_DATE}"

            CURRENT_FEED_INFO="data/${FOLDER}/static/feed_info.txt"
            if [ -f "${CURRENT_FEED_INFO}" ]; then
              CURRENT_START_DATE=$(tail -n +2 "${CURRENT_FEED_INFO}" \
                | cut -d',' -f4 \
                | tr -d '\r' \
                | head -1)
              echo "現在のデータの開始日: ${CURRENT_START_DATE}"
            else
              CURRENT_START_DATE="none"
              echo "現在のデータ: なし（初回取得）"
            fi

            if [ "$NEW_START_DATE" = "$CURRENT_START_DATE" ] \
              && [ "$FORCE_UPDATE" != "yes" ]; then
              echo "[スキップ] ${FOLDER} データに変更なし"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            echo "[更新] ${FOLDER}: ${CURRENT_START_DATE} → ${NEW_START_DATE}"
            rm -f "data/${FOLDER}/static/"*.txt
            unzip -o "${ZIP_DEST}" -d "data/${FOLDER}/static/"
            echo "展開完了:"
            ls "data/${FOLDER}/static/"
            UPDATED=$((UPDATED + 1))
          done

          # -------------------------------------------------------
          # 両備システムズ事業者（3社）
          # URLパターン: https://bus-vision.jp/gtfs_v2/<社名>/gtfsFeed
          # feed_info.txt が含まれない場合があるため
          # 強制更新またはファイルが存在しない場合のみ更新する
          # -------------------------------------------------------
          BUSVISION_OPERATORS=(
            "chugokubus   https://bus-vision.jp/gtfs_v2/chugokubus/gtfsFeed"
            "tomotetsu    https://bus-vision.jp/gtfs_v2/tomotetsubus/gtfsFeed"
            "ikasabus     https://bus-vision.jp/gtfs_v2/ikasabus/gtfsFeed"
          )

          for ENTRY in "${BUSVISION_OPERATORS[@]}"; do
            FOLDER=$(echo "$ENTRY" | awk '{print $1}')
            URL=$(echo   "$ENTRY" | awk '{print $2}')

            echo "========================================"
            echo "確認中（両備）: ${FOLDER}"

            mkdir -p "data/${FOLDER}/static"
            ZIP_DEST="/tmp/${FOLDER}.zip"

            HTTP_STATUS=$(curl -s -w "%{http_code}" \
              --max-time 60 \
              -L \
              -A "Mozilla/5.0 GitHubActions-GTFSFetcher/1.0" \
              -o "${ZIP_DEST}" \
              "${URL}")

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "[失敗] ${FOLDER} ZIPの取得に失敗 (HTTP ${HTTP_STATUS})"
              FAIL=$((FAIL + 1))
              continue
            fi

            # feed_info.txt があれば開始日で判定する
            # なければ強制更新またはファイルなしの場合のみ更新する
            NEW_START_DATE=$(unzip -p "${ZIP_DEST}" feed_info.txt 2>/dev/null \
              | tail -n +2 \
              | cut -d',' -f4 \
              | tr -d '\r' \
              | head -1)

            if [ -z "$NEW_START_DATE" ]; then
              # feed_info.txt がない場合はstops.txtの有無で判定する
              if [ -f "data/${FOLDER}/static/stops.txt" ] \
                && [ "$FORCE_UPDATE" != "yes" ]; then
                echo "[スキップ] ${FOLDER} stops.txt存在・強制更新なし"
                SKIPPED=$((SKIPPED + 1))
                continue
              fi
            else
              CURRENT_FEED_INFO="data/${FOLDER}/static/feed_info.txt"
              if [ -f "${CURRENT_FEED_INFO}" ]; then
                CURRENT_START_DATE=$(tail -n +2 "${CURRENT_FEED_INFO}" \
                  | cut -d',' -f4 \
                  | tr -d '\r' \
                  | head -1)
                if [ "$NEW_START_DATE" = "$CURRENT_START_DATE" ] \
                  && [ "$FORCE_UPDATE" != "yes" ]; then
                  echo "[スキップ] ${FOLDER} データに変更なし"
                  SKIPPED=$((SKIPPED + 1))
                  continue
                fi
              fi
            fi

            echo "[更新] ${FOLDER}"
            rm -f "data/${FOLDER}/static/"*.txt
            unzip -o "${ZIP_DEST}" -d "data/${FOLDER}/static/"
            echo "展開完了:"
            ls "data/${FOLDER}/static/"
            UPDATED=$((UPDATED + 1))
          done

          # -------------------------------------------------------
          # タウンクリエーション事業者（江田島バス）
          # URLパターン: https://gtfs-st.busit.jp/api/etajimabus
          # -------------------------------------------------------
          echo "========================================"
          echo "確認中（タウンクリエーション）: etajima"

          mkdir -p "data/etajima/static"
          ZIP_DEST="/tmp/etajima.zip"

          HTTP_STATUS=$(curl -s -w "%{http_code}" \
            --max-time 60 \
            -L \
            -A "Mozilla/5.0 GitHubActions-GTFSFetcher/1.0" \
            -o "${ZIP_DEST}" \
            "https://gtfs-st.busit.jp/api/etajimabus")

          if [ "$HTTP_STATUS" = "200" ]; then
            if [ -f "data/etajima/static/stops.txt" ] \
              && [ "$FORCE_UPDATE" != "yes" ]; then
              echo "[スキップ] etajima stops.txt存在・強制更新なし"
              SKIPPED=$((SKIPPED + 1))
            else
              echo "[更新] etajima"
              rm -f "data/etajima/static/"*.txt
              unzip -o "${ZIP_DEST}" -d "data/etajima/static/"
              echo "展開完了:"
              ls "data/etajima/static/"
              UPDATED=$((UPDATED + 1))
            fi
          else
            echo "[失敗] etajima (HTTP ${HTTP_STATUS})"
            FAIL=$((FAIL + 1))
          fi

          echo "========================================"
          echo "静的データ取得結果: ${UPDATED} 件更新, ${SKIPPED} 件スキップ, ${FAIL} 件失敗"
          echo "========================================"

          echo "${UPDATED}" > /tmp/updated_count.txt