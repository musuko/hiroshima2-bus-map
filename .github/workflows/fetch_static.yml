# =============================================================================
# fetch_static.yml
# 静的データを手動実行時のみ取得するワークフロー
# ダイヤ改正時（年2回程度）に手動で実行する
# =============================================================================

name: Fetch Static Data

on:
  workflow_dispatch:   # 手動実行のみ

jobs:
  fetch-static:
    name: 静的データ取得
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4.2.2

      - name: unzip をインストール
        run: sudo apt-get install -y unzip

      - name: 全事業者の静的GTFS-JPデータを取得・展開
        run: |
          BASE_URL="https://ajt-mobusta-gtfs.mcapps.jp/static"

          OPERATORS=(
            "hiroden            8"
            "hiroshimabus       9"
            "hirokotsu         10"
            "geiyo             11"
            "bihoku            12"
            "hdnishihiroshima  13"
            "fouble            14"
            "jrbus             15"
            "sasaki            17"
            "kurebus           18"
            "hatsukaichi       19"
            "onomichi          53"
            "asahi             54"
          )

          TOTAL=0
          SUCCESS=0
          FAIL=0

          for ENTRY in "${OPERATORS[@]}"; do
            FOLDER=$(echo "$ENTRY" | awk '{print $1}')
            OP_ID=$(echo  "$ENTRY" | awk '{print $2}')
            TOTAL=$((TOTAL + 1))
            mkdir -p "data/${FOLDER}/static"

            URL="${BASE_URL}/${OP_ID}/current_data.zip"
            ZIP_DEST="data/${FOLDER}/static/current_data.zip"

            echo "${FOLDER} (ID: ${OP_ID}) を取得中..."

            HTTP_STATUS=$(curl -s -w "%{http_code}" \
              --max-time 60 \
              -A "Mozilla/5.0 GitHubActions-GTFSFetcher/1.0" \
              -o "${ZIP_DEST}" \
              "${URL}")

            if [ "$HTTP_STATUS" = "200" ]; then
              unzip -o "${ZIP_DEST}" -d "data/${FOLDER}/static/"
              rm -f "${ZIP_DEST}"
              echo "[成功] ${FOLDER} 展開完了:"
              ls "data/${FOLDER}/static/"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "[失敗] ${FOLDER} (HTTP ${HTTP_STATUS})"
              rm -f "${ZIP_DEST}"
              FAIL=$((FAIL + 1))
            fi
          done

          echo "--------------------------------------------"
          echo "取得結果: ${SUCCESS}/${TOTAL} 成功, ${FAIL} 失敗"
          echo "--------------------------------------------"

      - name: 静的データをコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*/static/*.txt
          if git diff --cached --quiet; then
            echo "変更なし。スキップします。"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d')
            git commit -m "chore: update static GTFS-JP data ${TIMESTAMP} [skip ci]"
            git push
            echo "プッシュしました。"
          fi
